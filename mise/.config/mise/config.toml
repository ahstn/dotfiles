[tools]

# languages and tooling
python = "latest"
rust = "latest"
ruff = "latest"
node = "lts"
uv = "latest"
opencode = "latest"
terraform = "latest"
pitchfork = "latest"
bun = "latest"

# containers
colima = "latest"
docker-cli = "latest"
lima = "latest"

# general cli
ripgrep = "latest"
starship = "latest"
eza = "latest"
bat = "latest"
tmux = "latest"
difftastic = "latest"
"github:jnsahaj/lumen" = "latest"

# fuzzy finders and navigation
zoxide = "latest"
fzf = "latest"
television = "latest"
"github:wfxr/forgit" = "latest"
"npm:@tobilu/qmd" = "latest"
pi = "latest"
"npm:agent-browser" = "latest"

# misc & unsorted

[hooks]
enter = "mise i -q"

[settings]
idiomatic_version_file_enable_tools = ["python"]
experimental = true
minimum_release_age = "3d"

trusted_config_paths = [
  '~/git/',
  '~/.codex/worktrees/'
]
