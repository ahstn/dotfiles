onboarding = false

[keys]
prefix = "ctrl+space"
rename_workspace = "prefix+shift+4"
new_tab = "prefix+c"
split_horizontal = "prefix+shift+2"
split_vertical = "prefix+shift+5"
zoom = "prefix+z"

[theme]
name = "catppuccin"

[ui]
accent = "cyan"
sidebar_width = 32
sidebar_min_width = 22
agent_panel_scope = "all"
show_agent_labels_on_pane_borders = true

[ui.sound]
enabled = true

[ui.toast]
enabled = true

[experimental]
allow_nested = true
